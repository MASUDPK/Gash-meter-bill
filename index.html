<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আবাসিক গ্যাস ম্যানেজমেন্ট সিস্টেম</title>
    <!-- Tailwind CSS (Fixed URL) -->
    <script src="https://jsdelivr.net"></script>
    <!-- EmailJS Library (Fixed URL) -->
    <script src="https://jsdelivr.net"></script>
    <script>
        (function() {
            emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");
        })();
    </script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <!-- Header Section (আপনার বাড়ির ঠিকানা ও তথ্য) -->
    <header class="bg-blue-700 text-white p-6 shadow-md text-center">
        <h1 class="text-3xl font-bold mb-2">🏠 সোনালী নীড় (৮ তলা ভবন)</h1>
        <p class="text-sm opacity-90">ঠিকানা: হাউজ #১২, রোড #০৫, ধানমন্ডি, ঢাকা</p>
        <p class="text-sm opacity-90">ফোন: +৮৮০১৭১২৩৪৫६৭৮ | ইমেইল: owner@email.com</p>
    </header>

    <div class="container mx-auto p-4 md:p-8 max-w-7xl">
        
        <!-- Main Admin Dashboard Panel -->
        <section class="bg-white rounded-xl shadow-md p-6 mb-8 border-t-4 border-blue-600">
            <h2 class="text-xl font-bold mb-4 text-blue-700 border-b pb-2">📊 মেইন ড্যাশবোর্ড (চলতি মাস)</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <label class="block text-xs font-semibold text-gray-600 mb-1">সাব-স্টেশন মোট কেনা গ্যাস (টাকা)</label>
                    <input type="number" id="mainTotalTk" oninput="calculateBills()" class="w-full bg-white border border-gray-300 rounded px-2 py-1 text-xl font-bold text-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400" value="15000">
                </div>
                <div class="bg-green-50 p-4 rounded-lg border border-green-100">
                    <label class="block text-xs font-semibold text-gray-600 mb-1">সাব-স্টেশন মোট ইউনিট (m³)</label>
                    <input type="number" id="mainTotalUnit" oninput="calculateBills()" class="w-full bg-white border border-gray-300 rounded px-2 py-1 text-xl font-bold text-green-900 focus:outline-none focus:ring-2 focus:ring-green-400" value="1000">
                </div>
                <div class="bg-purple-50 p-4 rounded-lg border border-purple-100">
                    <label class="block text-xs font-semibold text-gray-600 mb-1">২৮টি মিটারে মোট পুড়ছে (ইউনিট)</label>
                    <div id="calcTotalUnit" class="text-xl font-bold text-purple-900 mt-1">0.00</div>
                </div>
                <div class="bg-amber-50 p-4 rounded-lg border border-amber-100">
                    <label class="block text-xs font-semibold text-gray-600 mb-1">মোট সংগৃহীত টাকা (বিল)</label>
                    <div id="calcTotalTk" class="text-xl font-bold text-amber-900 mt-1">৳ 0.00</div>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-3 justify-end">
                <button onclick="calculateBills()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-sm transition duration-200 cursor-pointer">🔄 হিসাব আপডেট করুন</button>
                <button onclick="saveDataToLocal()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow-sm transition duration-200 cursor-pointer">💾 ডাটা সেভ করুন</button>
                <button onclick="sendEmailBackup()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg shadow-sm transition duration-200 cursor-pointer">📧 মেইলে ব্যাকআপ পাঠান</button>
            </div>
        </section>

        <!-- 28 Meter Profiles Table -->
        <section class="bg-white rounded-xl shadow-md p-6 overflow-hidden border border-gray-200">
            <h2 class="text-xl font-bold mb-4 text-gray-700 border-b pb-2">🔑 ২৮টি ফ্ল্যাটের আলাদা প্রোফাইল ও মিটার রিডিং</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700 text-left text-sm font-semibold border-b border-gray-200">
                            <th class="py-3 px-4 text-left">ফ্ল্যাট / প্রোফাইল</th>
                            <th class="py-3 px-4 text-left">মিটার নম্বর</th>
                            <th class="py-3 px-4 text-left">পূর্বের রিডিং</th>
                            <th class="py-3 px-4 text-left">বর্তমান রিডিং</th>
                            <th class="py-3 px-4 text-left">ব্যবহৃত ইউনিট</th>
                            <th class="py-3 px-4 text-left">মোট বিল (টাকা)</th>
                        </tr>
                    </thead>
                    <tbody id="meterTableBody" class="text-gray-600 text-sm divide-y divide-gray-100">
                        <!-- JavaScript উইল জেনারেট ২৮টি রো এখানে -->
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <!-- JavaScript Logic -->
    <script>
        const totalMeters = 28;
        let gasData = [];

        function initData() {
            const savedData = localStorage.getItem('gasManagementData');
            if (savedData) {
                gasData = JSON.parse(savedData);
            } else {
                for (let i = 1; i <= totalMeters; i++) {
                    let floor = Math.ceil(i / 4); 
                    let unitLetter = String.fromCharCode(64 + (i % 4 || 4)); 
                    gasData.push({
                        id: i,
                        flat: `ফ্ল্যাট-${floor}${unitLetter}`,
                        meterNo: `G-MET-100${i}`,
                        prevReading: 100,
                        currReading: 120,
                        usedUnit: 20,
                        totalBill: 300
                    });
                }
            }
            renderTable();
            calculateBills();
        }

        function renderTable() {
            const tbody = document.getElementById('meterTableBody');
            tbody.innerHTML = '';
            gasData.forEach((meter, index) => {
                const row = `
                    <tr class="hover:bg-gray-50 transition duration-150">
                        <td class="py-3 px-4 font-semibold text-gray-900">${meter.flat}</td>
                        <td class="py-3 px-4 text-gray-500">${meter.meterNo}</td>
                        <td class="py-3 px-4">
                            <input type="number" oninput="updateMeter(${index}, 'prevReading', this.value)" class="border border-gray-300 rounded px-2 py-1 w-24 focus:outline-none focus:ring-1 focus:ring-blue-500" value="${meter.prevReading}">
                        </td>
                        <td class="py-3 px-4">
                            <input type="number" oninput="updateMeter(${index}, 'currReading', this.value)" class="border border-gray-300 rounded px-2 py-1 w-24 focus:outline-none focus:ring-1 focus:ring-blue-500" value="${meter.currReading}">
                        </td>
                        <td class="py-3 px-4 font-bold text-blue-600" id="used-${index}">${meter.usedUnit}</td>
                        <td class="py-3 px-4 font-bold text-green-600" id="bill-${index}">৳ ${meter.totalBill}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function updateMeter(index, field, value) {
            gasData[index][field] = parseFloat(value) || 0;
            
            // লাইভ রো ক্যালকুলেশন
            let used = gasData[index].currReading - gasData[index].prevReading;
            if (used < 0) used = 0;
            
            let mainTk = parseFloat(document.getElementById('mainTotalTk').value) || 0;
            let mainUnit = parseFloat(document.getElementById('mainTotalUnit').value) || 0;
            let perUnitRate = mainUnit > 0 ? (mainTk / mainUnit) : 15;
            let bill = used * perUnitRate;

            gasData[index].usedUnit = used.toFixed(2);
            gasData[index].totalBill = bill.toFixed(2);

            document.getElementById(`used-${index}`).innerText = used.toFixed(2);
            document.getElementById(`bill-${index}`).innerText = '৳ ' + bill.toFixed(2);

            calculateTotalsOnly();
        }

        function calculateTotalsOnly() {
            let sumUnit = 0;
            let sumTk = 0;
            gasData.forEach(meter => {
                sumUnit += parseFloat(meter.usedUnit) || 0;
                sumTk += parseFloat(meter.totalBill) || 0;
            });
            document.getElementById('calcTotalUnit').innerText = sumUnit.toFixed(2) + " m³";
            document.getElementById('calcTotalTk').innerText = '৳ ' + sumTk.toFixed(2);
        }

        function calculateBills() {
            let mainTk = parseFloat(document.getElementById('mainTotalTk').value) || 0;
            let mainUnit = parseFloat(document.getElementById('mainTotalUnit').value) || 0;
            let perUnitRate = mainUnit > 0 ? (mainTk / mainUnit) : 15;

            let sumUnit = 0;
            let sumTk = 0;

            gasData.forEach((meter, index) => {
                let used = meter.currReading - meter.prevReading;
                if (used < 0) used = 0; 
                let bill = used * perUnitRate;

                gasData[index].usedUnit = used.toFixed(2);
                gasData[index].totalBill = bill.toFixed(2);

                sumUnit += used;
                sumTk += bill;

                const usedEl = document.getElementById(`used-${index}`);
                const billEl = document.getElementById(`bill-${index}`);
                if(usedEl) usedEl.innerText = used.toFixed(2);
                if(billEl) billEl.innerText = '৳ ' + bill.toFixed(2);
            });

            document.getElementById('calcTotalUnit').innerText = sumUnit.toFixed(2) + " m³";
